
# VPS only (Frontend trên Vercel): Backend + Postgres + Redis + MinIO
# Chạy: docker compose -f docker-compose.vps.yml --env-file .env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: tailieuptit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tailieuptit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tailieuptit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tailieuptit} -d ${POSTGRES_DB:-tailieuptit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: tailieuptit-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: tailieuptit-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tailieuptit-backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tailieuptit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tailieuptit}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "480"
      ENVIRONMENT: production
      ENABLE_HSTS: "true"
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-api.tailieuptit.lcdkhoacntt1.com}
      RATE_LIMIT_FAIL_CLOSED: "true"
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAX_FILE_SIZE_MB: "50"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      STORAGE_QUOTA_GB: ${STORAGE_QUOTA_GB:-60}
    ports:
      # Chỉ bind localhost — Caddy/Nginx trên host sẽ proxy HTTPS vào đây
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - internal
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  internal:
    internal: true
  web:
