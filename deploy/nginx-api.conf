# Production API reverse proxy — place in /etc/nginx/sites-available/
# Replace api.example.com and upstream as needed.

limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

upstream tailieuptit_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name api.tailieuptit.example.com;

    # ssl_certificate /etc/letsencrypt/live/api.tailieuptit.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.tailieuptit.example.com/privkey.pem;

    client_max_body_size 55m;
    client_body_buffer_size 128k;
    client_header_timeout 15s;
    client_body_timeout 30s;
    send_timeout 30s;
    keepalive_timeout 65s;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /auth/login {
        limit_req zone=api_login burst=3 nodelay;
        limit_conn conn_per_ip 10;
        proxy_pass http://tailieuptit_backend;
        include /etc/nginx/proxy_params;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /admin/upload {
        limit_req zone=api_upload burst=2 nodelay;
        limit_conn conn_per_ip 5;
        proxy_pass http://tailieuptit_backend;
        include /etc/nginx/proxy_params;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    location / {
        limit_req zone=api_general burst=20 nodelay;
        limit_conn conn_per_ip 30;
        proxy_pass http://tailieuptit_backend;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
